body:
  text: 曹魏天竺三藏康僧鎧譯諸結戒法第一結戒場文兩界不得並若欲大界內安戒場者先竪戒場四方內相外相相去一肘使人唱內一周竟言此是內相彼為外相如是第二第三唱衆中堪能羯磨者結不得受欲以未結界故大德僧聽此住處比丘某甲唱四方小界相若僧時到僧忍聽僧今於此四方小界相內結作戒場白如是大德僧聽此住處比丘某甲唱四方小界相僧今於此四方小界相內結作戒場誰諸長老忍僧於此四方小界相內結作戒場者默然誰不忍者説僧已忍於此四方小界相內結作戒場竟僧忍默然故是事如是持結大戒文應次結大界先標榜四方大界定相牆周外不用遠喜妨布薩人三唱衆中堪使羯磨者結亦不得受欲以未結界故大德僧聽此住處比丘某甲唱四方大界相若僧時到僧忍聽僧今於此四方大界相內結大界同一住處同一説戒白如是大德僧聽此住處比丘某甲唱四方大界相僧今於此四方大界相內結大界同一住處同一説戒誰諸長老忍僧於此四方大界相內結大界同一住處同一説戒者默然誰不忍者説僧已忍於此四方大界相內同一住處同一説戒結大界竟僧忍默然故是事如是持結不失衣界文不失衣界更無別相依大界相結故言此住處大德僧聽此住處同一住處同一説戒若僧時到僧忍聽僧今結不失衣界除村村外界白如是大德僧聽此住處同一住處同一説戒僧今結不失衣界除村村外界誰諸長老忍僧於此住處同一住處同一説戒結不失衣界除村村外界者默然誰不忍者説僧已忍同一住處同一説戒結不失衣界除村村外界竟僧忍默然故是事如是持若二界相近應留中間不得相接若欲解界應先解不失衣界却解大界不得隔駛流水或時能斷渡除常有橋梁耳解不失衣界文大德僧聽此住處比丘同一住處同一説戒若僧時到僧忍聽僧今解不失衣界白如是大德僧聽此住處比丘同一住處同一説戒僧今解不失衣界誰諸長老忍僧同一住處同一説戒解不失衣界者默然誰不忍者説僧已忍同一住處同一説戒解不失衣界竟僧忍默然故是事如是持解大界文大德僧聽此住處比丘同一住處同一説戒若僧時到僧忍聽今解大界白如是大德僧聽此住處比丘同一住處同一説戒僧今解大界誰諸長老忍僧同一住處同一説戒解大界者默然誰不忍者説僧已忍同一住處同一説戒解大界竟僧忍默然故是事如是持解戒場文大德僧聽今有爾所比丘集若僧時到僧忍聽僧今解此處戒場白如是大德僧聽今有爾許比丘集僧今解此處戒場誰諸長老忍僧解此處戒場者默然誰不忍者説僧已忍解此處戒場竟僧忍默然故是事如是持布薩日及自恣日在道行若不和合結坐處小界文大德僧聽諸比丘坐處已滿齊如是比丘坐處若僧時到僧忍聽僧今於此坐處結小界白如是大德僧聽齊如是比丘坐處僧今於此坐處結小界誰諸長老忍僧齊如是比丘坐處結小界者默然誰不忍者説僧已忍齊如是比丘坐處結小界竟僧忍默然故是事如是持即還解此小界文大德僧聽齊如是比丘坐處若僧時到僧忍聽僧今解此坐處小界白如是大德僧聽齊如是比丘坐處僧今解此坐處小界誰諸長老忍僧齊如是比丘坐處解此坐處小界者默然誰不忍者説僧已忍齊如是比丘坐處解此坐處小界竟僧忍默然故是事如是持受戒法第二度沙彌法若欲在僧伽藍中剃髮當白一切僧若不和合房房語令知已與剃髮和合當作白白已然後與剃髮當作如是白大德僧聽此某甲欲求某甲剃髮若僧時到僧忍聽與某甲剃髮白如是若僧伽藍中度令出家當白一切僧白已聽與出家當作如是白大德僧聽此某甲從某甲求出家若僧時到僧忍聽與某甲出家白如是作如是白已與出家教使著袈裟偏露右肩脫革屣右膝著地合掌當教如是語我某甲盡形壽歸依佛歸依法歸依僧隨佛出家某甲為和上如來至真等正覺是我世尊第二第三亦如是説我某甲歸依佛歸依法歸依僧隨佛出家竟某甲為和上如來至真等正覺是我世尊第二第三亦如是説當受戒盡形壽不得殺生是沙彌戒能持不答言能盡形壽不得盜是沙彌戒能持不答言能盡形壽不得淫是沙彌戒能持不答言能盡形壽不得妄語是沙彌戒能持不答言能盡形壽不得飲酒是沙彌戒能持不答言能盡形壽不得著花鬘香油塗身是沙彌戒能持不答言能盡形壽不得歌舞倡伎及往觀聽是沙彌戒能持不答言能盡形壽不得高大床上坐是沙彌戒能持不答言能盡形壽不得非時食是沙彌戒能持不答言能盡形壽不得捉持生像嚴飾寶物是沙彌戒能持不答言能此是沙彌十戒盡形壽不得犯汝已受戒竟當供養三寶佛寶法寶比丘僧寶勤修三業坐禪誦經勸佐衆事請和上文大德一心念我某甲請大德為和上願大德為我作和上我依大德故得受具足戒第二第三亦如是説和上應語言可爾若言好爾衆僧應安欲受具足者離聞處著見處時戒師應問衆中誰能為某甲作教授師若有者答言我能戒師應作白大德僧聽此某甲從某甲求受具足戒若僧時到僧忍聽某甲作教授師白如是教授師應往受戒人所問言此安陀會鬱多羅僧僧伽梨鉢是衣鉢是汝有不答言是應語言善男子聽今是真實誠時實言實不實當言不實汝曾作比丘不若言作持戒清淨不如法還戒不不犯淨行尼不不賊心受戒不不破內外道不非黃門不不殺父殺母殺阿羅漢破僧不汝非非人不非畜生不非二根不汝字何等和上字誰年滿二十未三衣鉢具不父母聽汝不汝不負債不汝非奴不汝非官人不汝是丈夫不丈夫有如是病癩癰疽白癩乾痟癲狂病汝有如是病不答言無應語言如我今問汝僧中亦當如是問如汝向者答我僧中亦當如是答教授師如是問已還僧中如常威儀至舒手及處立應作如是白大德僧聽此某甲從某甲求受具足戒若僧時到僧忍聽我問已聽將來白如是教授師應喚受戒人言汝來來已為捉衣鉢教禮僧足已在戒師前長跪合掌教授應教乞戒作如是乞大德僧聽我某甲從某甲求受具足戒我某甲今從僧乞受具足戒和上某甲願僧濟度我慈愍故第二第三亦如是説時戒師應作白大德僧聽此某甲從某甲求受具足戒此某甲今從僧乞受具足戒和上某甲若僧時到僧忍聽我問內法白如是善男子聽今是真誠時實語時隨所問汝汝當隨實答汝曾作比丘不若言作持戒清淨不如法還戒不不犯淨行尼不不賊心受戒不不破內外道不非黃門不不殺父殺母殺阿羅漢破僧不汝非非人不非畜生不非二根不汝字何等和上字誰年滿二十未三衣鉢具不父母聽汝不汝不負債不汝非奴不汝非官人不汝是丈夫不丈夫有如是病癩癰疽白癩乾痟顛狂汝有如是病不若言無應作白四羯磨也大德僧聽此某甲從某甲求受具足戒此某甲今從僧乞受具足戒和上某甲自説清淨無諸難事年滿二十三衣鉢具若僧時到僧忍聽僧今授某甲具足戒和上某甲白如是大德僧聽此某甲從某甲求受具足戒此某甲今從僧乞受具足戒和上某甲自説清淨無諸難事年滿二十三衣鉢具僧今授某甲具足戒和上某甲誰諸長老忍僧與某甲受具足戒和上某甲者默然誰不忍者説是初羯磨第二第三亦如是説僧已忍與某甲受具足戒竟和上某甲僧忍默然故是事如是持善男子聽如來無所著等正覺説四波羅夷法若比丘犯一一法非沙門非釋種子汝一切不得犯淫欲作不淨行若比丘犯淫欲作不淨行乃至共畜生非沙門非釋種子汝是中盡形壽不得作能持不答言能一切不得盜乃至草葉若比丘盜人五錢若過五錢若自取教人取自斫教人斫自破教人破若燒若埋若壞色非沙門非釋種子汝是中盡形壽不得作能持不答言能一切不得故斷衆生命乃至蟻子若比丘故自手斷人命持刀授與人教死讚死勸死與人非藥若墮胎若厭禱殺自作方便若教人作非沙門非釋種子汝是中盡形壽不得作能持不答言能一切不得妄語乃至戲笑若比丘不真實非己有自稱言得上人法得禪得解脫得定得四空定得須陀洹果斯陀含果阿那含果阿羅漢果言天來龍來鬼神來供養非沙門非釋種子汝是中盡形壽不得作能持不答言能善男子聽如來無所著等正覺説四依法比丘出家依是出家人法依糞掃衣是比丘出家人法是中盡形壽能持不答言能若得長利檀越送衣割截衣三種壞色衣亦得受依乞食是比丘出家人法是中盡形壽能持不答言能若得長利若僧差食檀越送食月八日食十五日食月初日食衆僧常食檀越請食得受依樹下坐是比丘出家人法是中盡形壽能持不答言能若得長利別房尖頭屋小房石室兩房一戶得受依腐爛藥是比丘出家人法是中盡形壽能持不答言能若得長利酥油生酥蜜石蜜得受汝已受戒竟白四羯磨如法成就得處所和上如法阿闍梨如法衆僧具足當善受教法應勸化作福治塔供養衆僧和上阿闍梨一切如法教不得違逆應學問誦經勤求方便於佛法中得須陀洹果斯陀含果阿那含果阿羅漢果汝始發心出家功不唐捐果報不斷餘所未知當問和上阿闍梨應令受戒人在前去受衣鉢文長老一心念此僧伽梨若干條割截成今受持不離宿第二第三亦如是説餘二衣亦如是受長老一心念此鉢多羅應量器今受持常用故第二第三亦如是説請依止文大德一心念我某甲請大德為依止阿闍梨願大德為我作依止阿闍梨我依大德故得住第二第三亦如是説師應言莫放逸若言好若言去弟子答言爾諸除罪法第三乞覆藏羯磨文大德僧聽我比丘某甲犯僧殘罪覆藏我比丘某甲犯僧殘罪隨覆藏日今從僧乞覆藏羯磨願僧與我隨覆藏日羯磨慈愍故第二第三亦如是説與覆藏羯磨文大德僧聽比丘某甲犯僧殘罪覆藏此比丘某甲犯僧殘罪隨覆藏日從僧乞覆藏羯磨若僧時到僧忍聽僧今與比丘某甲隨覆藏日羯磨白如是大德僧聽比丘某甲犯僧殘罪覆藏此比丘某甲犯僧殘罪隨覆藏日從僧乞覆藏羯磨僧今與比丘某甲隨覆藏日羯磨誰諸長老忍僧與比丘某甲隨覆藏日羯磨者默然誰不忍者説是初羯磨第二第三亦如是説僧已忍與比丘某甲隨覆藏日羯磨竟僧忍默然故是事如是持行覆藏者有八事失宿一一事皆得突吉羅罪何等八往餘寺不白有客比丘來不白有餘事出外不白寺內餘行者不白病不遣信者白一二三人共室宿無比丘處住不半月半月説戒時白是為八事失宿佛聽半月半月説戒時白應如是白彼行覆藏者應至僧中偏露右肩脫革屣右膝著地合掌白言大德僧聽我比丘某甲犯僧殘罪覆藏我比丘某甲犯僧殘罪隨覆藏日從僧乞覆藏羯磨僧已與我隨覆藏日羯磨我比丘某甲已行若干日未行若干日白大德僧令知我行覆藏乞摩那埵羯磨文大德僧聽我比丘某甲犯僧殘罪覆藏我比丘某甲犯僧殘罪隨覆藏日已從僧乞覆藏羯磨僧已與我隨覆藏日羯磨我比丘某甲行覆藏竟今從僧乞六夜摩那埵羯磨願僧與我六夜摩那埵羯磨慈愍故第二第三亦如是説與摩那埵羯磨文大德僧聽比丘某甲犯僧殘罪覆藏此比丘某甲犯僧殘罪隨覆藏日已從僧乞覆藏羯磨僧已與比丘某甲隨覆藏日羯磨此比丘某甲行覆藏竟今從僧乞六夜摩那埵羯磨若僧時到僧忍聽今與比丘某甲六夜摩那埵羯磨白如是大德僧聽比丘某甲犯僧殘罪覆藏此比丘某甲犯僧殘罪隨覆藏日已從僧乞覆藏羯磨僧已與比丘某甲隨覆藏日羯磨此比丘某甲行覆藏竟今從僧乞六夜摩那埵羯磨僧今與比丘某甲六夜摩那埵羯磨誰諸長