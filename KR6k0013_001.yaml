淨無諸難事年歲已滿衣鉢具足若僧時到僧忍聽僧今授某甲大戒和上尼某甲白如是大姊僧聽此某甲從和上尼某甲求受大戒此某甲今從僧乞受大戒和上尼某甲所説清淨無諸難事年歲已滿衣鉢具足僧今授某甲大戒和上尼某甲誰諸大姊忍僧今授某甲大戒和上尼某甲者默然誰不忍者説是初羯磨第二第三亦如是説僧已忍與某甲受大戒竟和上尼某甲僧忍默然故是事如是持受戒人與尼僧俱至比丘僧中大戒文彼受戒者應與比丘尼僧俱至比丘僧中禮僧足已右膝著地合掌作如是言大德僧聽我某甲從和上尼某甲求受大戒我某甲今從僧乞受大戒和上尼某甲願僧濟度我慈愍故第二第三亦如是説此中戒師應作白已問諸難事大德僧聽此某甲從和上尼某甲求受大戒此某甲今從僧乞受大戒和上尼某甲若僧時到僧忍聽我問諸難事白如是善女諦聽今是真誠時實當言實不實當言不實隨所問汝汝當以實答我汝不曾作比丘尼不不賊心受戒不不殺父殺母殺阿羅漢不非非人不非畜生不非二根人不汝字何等和上字誰年歲滿不衣鉢具足不父母夫主為聽汝不汝不負人債不非婢不汝是女人不女人有如是諸病癩癰疽白癩乾痟癲狂病汝有如是諸病不若言無應問言汝學戒未汝清淨不若言已學戒清淨應問餘比丘尼言已學戒未清淨不若言已學戒清淨即應作白四羯磨大德僧聽此某甲從和上尼某甲求受大戒此某甲今從僧乞受大戒和上尼某甲所説清淨無諸難事年歲已滿衣鉢具足已學戒清淨若僧時到僧忍聽僧今為某甲受大戒和上尼某甲白如是大德僧聽此某甲從和上尼某甲求受大戒此某甲今從僧乞受大戒和上尼某甲所説清淨無諸難事年歲已滿衣鉢具足已學戒清淨僧今為某甲受大戒和上尼某甲誰諸長老忍僧與某甲受大戒和上尼某甲者默然誰不忍者説是初羯磨第二第三亦如是説僧已忍為某甲受大戒竟和上尼某甲僧忍默然故是事如是持善女人諦聽如來無所著等正覺説八波羅夷法若比丘尼犯者非比丘尼非釋種女一切不得作不淨行行淫欲法若比丘尼作不淨行行淫欲法乃至共畜生非比丘尼非釋種女是中盡形壽不得犯能持不答言能不得偷盜乃至草葉若比丘尼取人五錢若過五錢自取教人取自斫教人斫自破教人破若燒若埋若壞色非比丘尼非釋種女是中盡形壽不得犯能持不答言能不得斷衆生命乃至蟻子若比丘尼自手斷若教他斷人命持刀授與教死讚死勸死與人非藥若墮胎厭禱呪術若自作方便教人作非比丘尼非釋種女是中盡形壽不得犯能持不答言能不得妄語乃至戲笑若比丘尼不真實非己有自稱得上人法得禪得解脫三昧正受得須陀洹果斯陀含果阿那含果阿羅漢果言天來龍來鬼神來供養我非比丘尼非釋種女是中盡形壽不得犯能持不答言能不得身相摩觸乃至共畜生若比丘尼有染污心與染污心男子身相觸腋以下膝以上若摩若捺若逆摩若順摩若牽若推若舉若下若捉若急捺非比丘尼非釋種女是中盡形壽不得犯能持不答言能不得犯八事乃至共畜生若比丘尼有染污心與染污心男子受捉手捉衣至屏處屏處住屏處語若共行若身相近若共期犯此八事非比丘尼非釋種女是中盡形壽不得犯能持不答言能不得覆藏他罪乃至突吉羅惡説若比丘尼知比丘尼犯波羅夷不自舉不白僧不語人令知後於異時此比丘尼若休道若滅擯若作不共住若入外道後作如是言我先知此人如是如是非比丘尼非釋種女覆藏他重罪故是中盡形壽不得犯能持不答言能不得隨被舉比丘語乃至沙彌若比丘尼知比丘為僧所舉如法如毗尼如佛所教犯威儀未懺悔不作共住便隨順彼比丘尼諫此比丘尼言大姊彼比丘為僧所舉如法如毗尼如佛所教犯威儀未懺悔不作共住莫隨順彼比丘語彼比丘尼諫此比丘尼時堅持不捨彼比丘尼應乃至三諫捨此事故乃至三諫捨者善若不捨者非比丘尼非釋種女犯隨舉是中盡形壽不得犯能持不答言能善女人諦聽如來無所著等正覺説四依法比丘尼出家依是是出家人法依糞掃衣是比丘尼出家法是中盡形壽能持不答言能若得長利檀越施衣割壞衣得受依乞食是比丘尼出家人法是中盡形壽能持不答言能若得長利若僧差食檀越送食月八日食十五日食月初日食衆常食檀越請食得受依樹下坐是比丘尼出家人法是中盡形壽能持不答言能若得長利別房尖頭小屋石室兩房一戶得受依腐爛藥是比丘尼出家人法是中盡形壽能持不答言能若得長利酥油生酥蜜石蜜得受汝已受戒竟白四羯磨如法成就得處所和上如法阿闍梨如法二部衆僧具足當善受教法應勸化作福治塔供養衆僧和上阿闍梨一切如法教不得違逆應學問誦經勤求方便於佛法中得須陀洹果斯陀含果阿那含果阿羅漢果汝始發心出家功不唐捐果報不斷餘所不知當問和上阿闍梨應令受戒人在前而去受衣鉢文受五衣鉢文請依止文子注盡同尼姊異除罪法第三比丘尼從二部僧乞摩那埵羯磨文治比丘尼僧殘罪無覆藏唯有半月在二部僧中行摩那埵行摩那埵竟與出罪摩那埵羯磨時大僧滿四人已上尼僧亦爾出罪時要二部僧各二十人彼尼來至僧中脫革屣偏露右肩禮僧足合掌胡跪從二部僧乞半月摩那埵應如是言大德僧聽我比丘尼某甲犯某甲僧殘罪今從二部僧乞半月摩那埵羯磨願僧與我半月摩那埵羯磨慈愍故第二第三亦如是説與摩那埵羯磨文大德僧聽比丘尼某甲犯某甲僧殘罪今從二部僧乞半月摩那埵羯磨若僧時到僧忍聽僧今與比丘尼某甲半月摩那埵羯磨白如是大德僧聽比丘尼某甲犯某甲僧殘罪今從二部僧乞半月摩那埵羯磨僧今與比丘尼某甲半月摩那埵羯磨誰諸長老忍僧與比丘尼某甲半月摩那埵羯磨者默然誰不忍者説是初羯磨第二第三亦如是説僧已忍與比丘尼某甲半月摩那埵羯磨竟僧忍默然故是事如是持摩那埵行法如大比丘法無異在尼僧中宿日日來白大僧令知作如是説大德僧聽我比丘尼某甲犯某甲僧殘罪從二部僧乞半月摩那埵羯磨僧已與我半月摩那埵羯磨我比丘尼某甲已行若干日餘有若干日在白大德僧令知我行摩那埵乞出罪羯磨文彼比丘尼來至二部僧中乞出罪羯磨應如是乞言大德僧聽我比丘尼某甲犯某甲僧殘罪從二部僧乞半月摩那埵羯磨僧已與我半月摩那埵羯磨我於二部僧中半月行摩那埵竟今從僧乞出罪羯磨願僧與我出罪羯磨慈愍故第二第三亦如是説與出罪羯磨文大德僧聽比丘尼某甲犯某甲僧殘罪從二部僧乞半月摩那埵羯磨已與比丘尼某甲半月摩那埵羯磨此比丘尼某甲已於二部僧中半月行摩那埵竟今從僧乞出罪羯磨若僧時到僧忍聽僧今與比丘尼某甲出罪羯磨白如是大德僧聽比丘尼某甲犯某甲僧殘罪從二部僧乞半月摩那埵羯磨僧已與比丘尼某甲半月摩那埵羯磨此比丘尼某甲已於二部僧中半月行摩那埵竟今從僧乞出罪羯磨僧今與比丘尼某甲出罪羯磨誰諸長老忍僧與比丘尼某甲出罪羯磨者默然誰不忍者説是初羯磨第二第三亦如是説僧已忍與比丘尼某甲出罪羯磨竟僧忍默然故是事如是持捨墮衣於僧中捨文捨墮僧中捨捨竟僧中懺悔請一人能受者白即一人前懺悔羯磨還彼衣三二一人邊捨懺皆亦同犯餘罪向二三人懺受者白邊人疑罪僧向三二一人發露子注次第名盡同尼姊異説戒法第四尼僧差人求教授羯磨文大姊僧聽若僧時到僧忍聽僧今差比丘尼某甲為比丘尼僧故半月往比丘僧中求教授白如是大姊僧聽僧今差比丘尼某甲為比丘尼僧故半月往比丘僧中求教授誰諸大姊忍僧差比丘尼某甲為比丘尼僧故半月往比丘僧中求教授者默然誰不忍者説僧已忍差比丘尼某甲為比丘尼僧故半月往比丘僧中求教授竟僧忍默然故是事如是持二人為伴往大僧中詣一舊比丘所禮足已曲身低頭合掌白言大德一心念比丘尼僧和合禮比丘僧足求教授第二第三亦如是説受囑比丘僧説戒時如是白言大德僧聽比丘尼僧和合禮僧足求教授第二第三亦如是説比丘尼明日應往問可否比丘應期往比丘尼應期來迎比丘期往聞教授人來當半道迎至寺內供給所須洗浴具美粥飲食果苽以此供養若不者突吉羅若比丘盡病若不和合若衆不滿當遣信往禮拜問訊若比丘尼盡病若衆不和合衆不滿亦當遣信往禮拜問訊若不往者突吉羅與清淨及欲文與欲及清淨受欲及清淨布薩説戒法八難及緣略説戒子注次第名盡同尼姊異安居法第五差人分房舍安居受七日受過七日文與過七日法子注次第名盡同尼姊異自恣法第六尼僧差人大僧中求自恣羯磨文大姊僧聽若僧時到僧忍聽僧今差比丘尼某甲為比丘尼僧故往大僧中説三事自恣見聞疑白如是大姊僧聽僧今差比丘尼某甲為比丘尼僧故往大僧中説三事自恣見聞疑誰諸大姊忍僧差比丘尼某甲為比丘尼僧故往大僧中説三事自恣見聞疑者默然誰不忍者説僧已忍差比丘尼某甲為比丘尼僧故往大僧中説三事自恣見聞疑竟僧忍默然故是事如是持二比丘尼為伴往大僧中禮僧足已曲身低頭合掌作如是説比丘僧夏安居竟比丘尼夏安居竟比丘僧説三事自恣見聞疑大德僧慈愍故語我我若見罪當如法懺悔第二第三亦如是説彼尼即比丘僧中自恣日便自恣而比丘疲極佛言不應爾比丘僧十四日自恣比丘尼十五日自恣若大僧病若衆不和合若衆不滿比丘尼應遣信禮拜問訊不者突吉羅若比丘尼衆病若衆不和合衆不滿比丘尼亦當遣信禮拜問訊不者突吉羅與欲自恣文與欲自恣受欲自恣人白僧自恣尼僧自恣四三二人互説獨一心念説八難白僧三語自恣白僧受功德衣人羯磨衣與持衣人僧前説衆僧尼受功德衣白出功德衣子注次第名盡同尼姊異分衣物法第七羯磨分衣物三二人相向受獨一心念受聽病人持亡者衣物至僧中説羯磨衣鉢與餘衣羯磨分三二人相向受獨一心念受盡同尼姊異作淨法第八結淨地差監淨人真淨展轉七日盡形壽受法子注次第名盡同尼姊異雜法第九自乞作小房足食受殘食受請已作殘食受請食前食後非時入村囑子注次第名盡同尼姊異文煩故不出僧祇律一人安居文我比丘某甲於此僧伽藍雨安居前三月我某甲比丘是住處夏安居前三月有緣事出界行受七日法是住處安居自恣
